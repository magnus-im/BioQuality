<!DOCTYPE html>
<html>
<head>
    <title>Gerar Certificado AGLUTINA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Gerar Certificado AGLUTINA</h1>
    <form method="POST">
        <label>Cliente:</label>
        <select name="client_id">
            <option value="">-- Selecionar Cliente Existente ou Digitar Novo --</option>
            {% for client in clients %}
            <option value="{{ client[0] }}">{{ client[1] }}</option>
            {% endfor %}
        </select><br>
        <label>Nome do Cliente (se novo):</label><input type="text" name="client_name"><br>
        <label>Quantidade Vendida:</label><input type="number" step="0.01" name="quantity_sold" required><br>
        <label>Nº Nota Fiscal:</label><input type="text" name="invoice_number" required><br>
        <label>Data de Emissão:</label><input type="date" name="issue_date" required><br>
        <input type="submit" value="Gerar Certificado">
    </form>
    <a href="/list_bulletins">Voltar</a>
</body>
</html>
